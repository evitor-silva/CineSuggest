apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinesuggest-deployment
  labels:
    app: cinesuggest-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cinesuggest-api
  template:
    metadata:
      labels:
        app: cinesuggest-api
    spec:
      containers:
        - name: cinesuggest-container
          image: vitoresbr/cinesuggest:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: oracle-db-secrets
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              value: "cinesuggest_user"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oracle-db-secrets
                  key: database-password
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: org.hibernate.dialect.OracleDialect
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: "oracle.jdbc.OracleDriver"

---
apiVersion: v1
kind: Service
metadata:
  name: cinesuggest-service-api
spec:
  type: ClusterIP
  selector:
    app: cinesuggest-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080