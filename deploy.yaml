apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinesuggest-deployment
  labels:
    app: cinesuggest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cinesuggest
  template:
    metadata:
      labels:
        app: cinesuggest
    spec:
      containers:
        - name: cinesuggest-container
          image: vitoresbr/cinesuggest:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: cinesuggest-service
spec:
  type: ClusterIP
  selector:
    app: cinesuggest
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080