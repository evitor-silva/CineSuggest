name: Java CI/CD with Gradle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.14.4'

      - name: Build with Gradle Wrapper
        run: chmod +x gradlew && ./gradlew build -x test

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (Multi-arch)
        uses: docker/build-push-action@v5
        with:
          file: ./docker/Dockerfile
          context: .
          push: true
          platforms: linux/amd64, linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cinesuggest:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cinesuggest:${{ github.sha }}

      - name: Replace image tag in deployment template
        run: |
          sed -i 's|cinesuggest:latest|cinesuggest:${{ github.sha }}|g' deploy.yaml

      - name: Copy deploy.yaml to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "deploy.yaml"
          target: "~/.k3s_deploys/${{ github.event.repository.name }}/"

      - name: Deploy on Server Ubuntu (K3s)
        uses: appleboy/ssh-action@v1.0.3
        with:
            host: ${{ secrets.SERVER_HOST }}
            username: ${{ secrets.SERVER_USER }}
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            port: 22
            script: |
              cd ~/.k3s_deploys/${{ github.event.repository.name }}/
              
              # 1. Limpa o Secret antigo para evitar conflitos de chaves
              k3s kubectl --kubeconfig=/var/www/.kube/config delete secret oracle-db-secrets --ignore-not-found=true
              
              # 2. Escreve os segredos em arquivos limpos (as aspas em 'EOF' blindam os caracteres especiais)
              cat << 'EOF' > db_pass.txt
              ${{ secrets.ORACLE_DB_PASSWORD }}
              EOF
              
              cat << 'EOF' > jwt_sec.txt
              ${{ secrets.JWT_SECRET }}
              EOF
              
              # 3. CRIAÇÃO NATIVA: O Kubernetes lê os arquivos e mapeia as chaves correspondentes
              k3s kubectl --kubeconfig=/var/www/.kube/config create secret generic oracle-db-secrets \
              --from-file=database-password=db_pass.txt \
              --from-file=jwt=jwt_sec.txt
              
              # 4. Remove os arquivos de texto imediatamente por segurança
              rm -f db_pass.txt jwt_sec.txt
              
              # 5. Aplica a infraestrutura da sua aplicação
              k3s kubectl --kubeconfig=/var/www/.kube/config apply -f deploy.yaml
              
              # 6. Reinicia a aplicação para carregar o Secret atualizado do Kubernetes
              k3s kubectl --kubeconfig=/var/www/.kube/config rollout restart deployment/cinesuggest-deployment