name: Java CI/CD with Gradle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.14.4'

      - name: Build with Gradle Wrapper
        run: chmod +x gradlew && ./gradlew build -x test

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (Multi-arch)
        uses: docker/build-push-action@v5
        with:
          file: ./docker/Dockerfile
          context: .
          push: true
          platforms: linux/amd64, linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cinesuggest:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cinesuggest:${{ github.sha }}

      - name: Replace image tag in deployment template
        run: |
          sed -i 's|cinesuggest:latest|cinesuggest:${{ github.sha }}|g' deploy.yaml

      - name: Deploy on Server Ubuntu (K3s)
        uses: appleboy/ssh-action@v1.0.3
        with:
            host: ${{ secrets.SERVER_HOST }}
            username: ${{ secrets.SERVER_USER }}
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            port: 22
            envs: ORACLE_DB_PASSWORD,JWT_SECRET
            script: |
              cd ~/.k3s_deploys/${{ github.event.repository.name }}/
              
              # Remove quebras de linha ocultas (\r) caso o arquivo tenha sido salvo no Windows
              CLEAN_PWD=$(echo "$ORACLE_DB_PASSWORD" | tr -d '\r')
              CLEAN_JWT=$(echo "$JWT_SECRET" | tr -d '\r')
              
              # 1. Limpa o Secret antigo
              k3s kubectl --kubeconfig=/var/www/.kube/config delete secret oracle-db-secrets --ignore-not-found=true
              
              # 2. Cria o Secret usando as variáveis limpas com aspas simples para evitar expansão indesejada de símbolos
              k3s kubectl --kubeconfig=/var/www/.kube/config create secret generic oracle-db-secrets \
                --from-literal=database-password=''"$CLEAN_PWD"'' \
                --from-literal=jwt='''"$CLEAN_JWT"'''
              
              # 3. Aplica o manifesto atualizado
              k3s kubectl --kubeconfig=/var/www/.kube/config apply -f deploy.yaml
              
              # 4. Reinicia os serviços para lerem os novos dados
              k3s kubectl --kubeconfig=/var/www/.kube/config rollout restart deployment/oracle-db-deployment
              
              # Aguarda 10 segundos para o banco começar a subir com a nova senha antes de chutar a app
              sleep 10 
              
              k3s kubectl --kubeconfig=/var/www/.kube/config rollout restart deployment/cinesuggest-deployment